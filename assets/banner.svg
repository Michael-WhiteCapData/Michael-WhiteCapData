<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Michael Tierney — Co-founder, WhiteCap Data">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A66C2"/>
      <stop offset="0.55" stop-color="#0B3D6B"/>
      <stop offset="1" stop-color="#071E33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0A66C2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="20" fill="url(#bg)"/>

  <!-- subtle geometric depth -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2">
    <circle cx="1040" cy="60" r="150"/>
    <circle cx="1100" cy="250" r="110"/>
    <circle cx="120" cy="280" r="120"/>
  </g>
  <g fill="#FFFFFF" fill-opacity="0.05">
    <circle cx="980" cy="150" r="6"/>
    <circle cx="1050" cy="120" r="4"/>
    <circle cx="1010" cy="210" r="5"/>
  </g>

  <!-- accent bar -->
  <rect x="72" y="92" width="64" height="6" rx="3" fill="url(#accent)"/>

  <text x="70" y="158" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Michael Tierney</text>
  <text x="72" y="200" font-size="27" font-weight="600" fill="#9FD0FF">Co-founder · WhiteCap Data</text>
  <text x="72" y="242" font-size="20" font-weight="400" fill="#FFFFFF" fill-opacity="0.78">Data integration · AI &amp; agent engineering · Self-hosted infrastructure</text>
</svg>
